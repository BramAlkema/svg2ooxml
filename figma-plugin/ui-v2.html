<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 16px;
      background: var(--figma-color-bg);
      color: var(--figma-color-text);
    }

    h2 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 16px;
      color: var(--figma-color-text);
    }

    button {
      width: 100%;
      padding: 12px 16px;
      margin: 8px 0;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .primary {
      background: #18A0FB;
      color: white;
    }

    .primary:hover:not(:disabled) {
      background: #0D8ADD;
    }

    .secondary {
      background: var(--figma-color-bg-secondary);
      color: var(--figma-color-text);
      border: 1px solid var(--figma-color-border);
    }

    .secondary:hover:not(:disabled) {
      background: var(--figma-color-bg-hover);
    }

    .user-info {
      padding: 12px;
      background: var(--figma-color-bg-secondary);
      border-radius: 6px;
      margin: 12px 0;
      font-size: 13px;
    }

    .user-info strong {
      display: block;
      margin-top: 4px;
      color: var(--figma-color-text);
    }

    .status {
      padding: 12px;
      margin: 12px 0;
      border-radius: 6px;
      font-size: 13px;
      line-height: 1.4;
      display: none;
    }

    .status.visible {
      display: block;
    }

    .status.info {
      background: #E3F2FD;
      color: #1565C0;
    }

    .status.success {
      background: #E8F5E9;
      color: #2E7D32;
    }

    .status.error {
      background: #FFEBEE;
      color: #C62828;
    }

    .status a {
      color: inherit;
      font-weight: 600;
      text-decoration: underline;
    }

    .section {
      margin: 16px 0;
    }

    .divider {
      height: 1px;
      background: var(--figma-color-border);
      margin: 16px 0;
    }

    .instructions {
      font-size: 12px;
      color: var(--figma-color-text-secondary);
      line-height: 1.5;
      margin: 12px 0;
      padding: 12px;
      background: var(--figma-color-bg-secondary);
      border-radius: 6px;
    }

    .logo {
      font-weight: 600;
      color: #18A0FB;
      margin-bottom: 8px;
    }

    .progress {
      width: 100%;
      height: 4px;
      background: var(--figma-color-bg-secondary);
      border-radius: 2px;
      overflow: hidden;
      margin: 8px 0;
      display: none;
    }

    .progress.visible {
      display: block;
    }

    .progress-bar {
      height: 100%;
      background: #18A0FB;
      transition: width 0.3s;
      width: 0%;
    }

    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid #E3F2FD;
      border-top-color: #1565C0;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="logo">svg2ooxml</div>
  <h2>Export to Google Slides</h2>

  <!-- Authentication Section -->
  <div id="auth-section" class="section">
    <button id="sign-in-btn" class="primary">
      Sign in with Google
    </button>

    <div id="user-info" class="user-info" style="display: none;">
      <div>Signed in as</div>
      <strong id="user-email"></strong>
      <button id="sign-out-btn" class="secondary" style="margin-top: 8px;">
        Sign out
      </button>
    </div>
  </div>

  <div class="divider"></div>

  <!-- Export Section -->
  <div id="export-section" class="section" style="display: none;">
    <div class="instructions">
      Select one or more frames in Figma, then click "Export to Slides" to create a Google Slides presentation.
    </div>

    <button id="export-btn" class="primary">
      Export Selected Frames
    </button>

    <div id="progress" class="progress">
      <div id="progress-bar" class="progress-bar"></div>
    </div>
  </div>

  <!-- Status Section -->
  <div id="status" class="status"></div>

  <script>
// SVG to Google Slides - Figma Plugin UI
// Supabase Auth + Coolify backend

const API_URL = localStorage.getItem('svg2ooxml_api_url') || 'https://svg2ooxml.tactcheck.com';
const AUTH_URL = localStorage.getItem('svg2ooxml_auth_url') || 'https://auth.supabase.tactcheck.com';
const AUTH_POLL_INTERVAL = 2000;
const AUTH_TIMEOUT = 120000;

// Current session state
let supabaseJwt = null;
let googleAccessToken = null;
let googleRefreshToken = null;
let userEmail = null;

// UI Elements
const signInBtn = document.getElementById('sign-in-btn');
const signOutBtn = document.getElementById('sign-out-btn');
const userInfoDiv = document.getElementById('user-info');
const userEmailSpan = document.getElementById('user-email');
const exportSection = document.getElementById('export-section');
const exportBtn = document.getElementById('export-btn');
const statusDiv = document.getElementById('status');
const progressDiv = document.getElementById('progress');
const progressBar = document.getElementById('progress-bar');

// ============================================================================
// Authentication
// ============================================================================

function generateAuthKey() {
  const array = new Uint8Array(16);
  crypto.getRandomValues(array);
  return Array.from(array, b => b.toString(16).padStart(2, '0')).join('');
}

async function pollForAuthToken(authKey) {
  const startTime = Date.now();

  while (Date.now() - startTime < AUTH_TIMEOUT) {
    try {
      const response = await fetch(`${API_URL}/api/v1/auth/poll?key=${authKey}`);
      if (response.ok) {
        const data = await response.json();
        if (data.status === 'complete') {
          return {
            supabaseJwt: data.supabase_jwt,
            googleAccessToken: data.google_access_token,
            googleRefreshToken: data.google_refresh_token,
            email: data.email
          };
        }
      }
    } catch (e) {
      // Ignore polling errors, keep trying
    }

    const elapsed = Math.round((Date.now() - startTime) / 1000);
    showStatus(`<span class="spinner"></span>Waiting for sign-in... (${elapsed}s)`, 'info');
    await sleep(AUTH_POLL_INTERVAL);
  }

  throw new Error('Authentication timed out. Please try again.');
}

signInBtn.addEventListener('click', async () => {
  try {
    signInBtn.disabled = true;
    showStatus('Opening sign-in window...', 'info');

    const authKey = generateAuthKey();
    const authUrl = `${AUTH_URL}/authorize?provider=google` +
      `&redirect_to=${encodeURIComponent(API_URL + '/auth/callback?auth_key=' + authKey)}` +
      `&scopes=${encodeURIComponent('https://www.googleapis.com/auth/drive.file https://www.googleapis.com/auth/presentations')}`;

    // Open popup via Figma's openExternal (works in sandbox)
    parent.postMessage({
      pluginMessage: { type: 'open-url', url: authUrl }
    }, '*');

    showStatus(`<span class="spinner"></span>Complete sign-in in your browser...`, 'info');

    const result = await pollForAuthToken(authKey);

    supabaseJwt = result.supabaseJwt;
    googleAccessToken = result.googleAccessToken;
    googleRefreshToken = result.googleRefreshToken;
    userEmail = result.email;

    await saveSession();
    updateUISignedIn();
    showStatus('Signed in successfully!', 'success');
    setTimeout(() => hideStatus(), 2000);

  } catch (error) {
    if (error.message.includes('timed out')) {
      showStatus('Sign-in timed out. Please try again.', 'error');
    } else {
      showStatus(`Sign-in failed: ${error.message}`, 'error');
    }
  } finally {
    signInBtn.disabled = false;
  }
});

signOutBtn.addEventListener('click', async () => {
  supabaseJwt = null;
  googleAccessToken = null;
  googleRefreshToken = null;
  userEmail = null;
  await clearSession();
  updateUISignedOut();
  showStatus('Signed out.', 'info');
  setTimeout(() => hideStatus(), 2000);
});

function updateUISignedIn() {
  signInBtn.style.display = 'none';
  userInfoDiv.style.display = 'block';
  userEmailSpan.textContent = userEmail;
  exportSection.style.display = 'block';
}

function updateUISignedOut() {
  signInBtn.style.display = 'block';
  userInfoDiv.style.display = 'none';
  exportSection.style.display = 'none';
}

// ============================================================================
// Session Persistence
// ============================================================================

async function saveSession() {
  parent.postMessage({
    pluginMessage: {
      type: 'save-session',
      supabaseJwt,
      googleAccessToken,
      googleRefreshToken,
      email: userEmail
    }
  }, '*');
}

async function clearSession() {
  parent.postMessage({
    pluginMessage: { type: 'clear-session' }
  }, '*');
}

// Request session restore on load
parent.postMessage({
  pluginMessage: { type: 'restore-session' }
}, '*');

// ============================================================================
// Token Refresh
// ============================================================================

async function refreshGoogleToken() {
  if (!googleRefreshToken) {
    throw new Error('No refresh token. Please sign in again.');
  }

  const response = await fetch(`${API_URL}/api/v1/auth/refresh`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ refresh_token: googleRefreshToken })
  });

  if (!response.ok) {
    throw new Error('Token refresh failed. Please sign in again.');
  }

  const data = await response.json();
  googleAccessToken = data.google_access_token;
  if (data.google_refresh_token) {
    googleRefreshToken = data.google_refresh_token;
  }

  await saveSession();
  return googleAccessToken;
}

// ============================================================================
// Export
// ============================================================================

exportBtn.addEventListener('click', async () => {
  if (!supabaseJwt || !googleAccessToken) {
    showStatus('Please sign in first.', 'error');
    return;
  }

  parent.postMessage({
    pluginMessage: { type: 'get-svg-content' }
  }, '*');
});

async function handleExport(frames, fileName) {
  try {
    exportBtn.disabled = true;
    showStatus(`<span class="spinner"></span>Exporting ${frames.length} frame(s)...`, 'info');
    showProgress(30);

    let response = await callExportAPI(frames, fileName);

    // If 401/403, try refreshing the Google token and retry once
    if (response.status === 401 || response.status === 403) {
      try {
        await refreshGoogleToken();
        response = await callExportAPI(frames, fileName);
      } catch (refreshError) {
        updateUISignedOut();
        await clearSession();
        supabaseJwt = null;
        googleAccessToken = null;
        googleRefreshToken = null;
        userEmail = null;
        showStatus('Session expired. Please sign in again.', 'error');
        hideProgress();
        return;
      }
    }

    showProgress(70);

    if (!response.ok) {
      let detail = `API error: ${response.status}`;
      try {
        const err = await response.json();
        detail = err.detail || detail;
      } catch (e) {}
      throw new Error(detail);
    }

    showProgress(90);
    const data = await response.json();
    showProgress(100);
    hideProgress();

    const slidesUrl = data.slides_url;
    if (slidesUrl) {
      showStatus(
        `Export complete! <a href="${slidesUrl}" target="_blank">Open in Google Slides</a>`,
        'success'
      );
      parent.postMessage({
        pluginMessage: { type: 'export-complete', slides_url: slidesUrl }
      }, '*');
    } else {
      showStatus('Export completed, but no Slides URL was returned.', 'error');
    }

  } catch (error) {
    console.error('Export error:', error);
    showStatus(`Export failed: ${error.message}`, 'error');
    hideProgress();
  } finally {
    exportBtn.disabled = false;
  }
}

async function callExportAPI(frames, fileName) {
  return fetch(`${API_URL}/api/v1/export`, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${supabaseJwt}`
    },
    body: JSON.stringify({
      frames: frames.map(f => ({
        name: f.name,
        svg_content: f.svg_content,
        width: f.width,
        height: f.height
      })),
      figma_file_name: fileName,
      output_format: 'slides',
      google_access_token: googleAccessToken
    })
  });
}

// ============================================================================
// Message Handler (from code.js)
// ============================================================================

window.onmessage = async (event) => {
  const msg = event.data.pluginMessage;

  if (msg.type === 'session-restored') {
    if (msg.supabaseJwt && msg.googleAccessToken && msg.email) {
      supabaseJwt = msg.supabaseJwt;
      googleAccessToken = msg.googleAccessToken;
      googleRefreshToken = msg.googleRefreshToken;
      userEmail = msg.email;
      updateUISignedIn();
    } else {
      updateUISignedOut();
    }
  }

  if (msg.type === 'svg-content') {
    await handleExport(msg.frames, msg.fileName);
  }

  if (msg.type === 'error') {
    showStatus(msg.message, 'error');
    hideProgress();
  }

  if (msg.type === 'status') {
    showStatus(msg.message, 'info');
  }
};

// ============================================================================
// UI Helpers
// ============================================================================

function showStatus(message, type) {
  statusDiv.textContent = '';
  if (message.includes('<')) {
    // Safe HTML insertion for trusted internal content (spinner, links)
    const temp = document.createElement('template');
    temp.innerHTML = message;
    statusDiv.appendChild(temp.content);
  } else {
    statusDiv.textContent = message;
  }
  statusDiv.className = `status ${type} visible`;
}

function hideStatus() {
  statusDiv.className = 'status';
}

function showProgress(percent) {
  progressDiv.className = 'progress visible';
  progressBar.style.width = `${percent}%`;
}

function hideProgress() {
  progressDiv.className = 'progress';
  progressBar.style.width = '0%';
}

function sleep(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}

// ============================================================================
// Error Handling
// ============================================================================

window.addEventListener('error', (event) => {
  console.error('Global error:', event.error);
  showStatus(`Unexpected error: ${event.error?.message || 'Unknown error'}`, 'error');
  hideProgress();
});

window.addEventListener('unhandledrejection', (event) => {
  console.error('Unhandled rejection:', event.reason);
  showStatus(`Error: ${event.reason?.message || 'Unknown error'}`, 'error');
  hideProgress();
});
  </script>
</body>
</html>
