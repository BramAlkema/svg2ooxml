<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 16px;
      background: var(--figma-color-bg);
      color: var(--figma-color-text);
    }

    h2 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 16px;
      color: var(--figma-color-text);
    }

    button {
      width: 100%;
      padding: 12px 16px;
      margin: 8px 0;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .primary {
      background: #18A0FB;
      color: white;
    }

    .primary:hover:not(:disabled) {
      background: #0D8ADD;
    }

    .secondary {
      background: var(--figma-color-bg-secondary);
      color: var(--figma-color-text);
      border: 1px solid var(--figma-color-border);
    }

    .secondary:hover:not(:disabled) {
      background: var(--figma-color-bg-hover);
    }

    .user-info {
      padding: 12px;
      background: var(--figma-color-bg-secondary);
      border-radius: 6px;
      margin: 12px 0;
      font-size: 13px;
    }

    .user-info strong {
      display: block;
      margin-top: 4px;
      color: var(--figma-color-text);
    }

    .status {
      padding: 12px;
      margin: 12px 0;
      border-radius: 6px;
      font-size: 13px;
      line-height: 1.4;
      display: none;
    }

    .status.visible {
      display: block;
    }

    .status.info {
      background: #E3F2FD;
      color: #1565C0;
    }

    .status.success {
      background: #E8F5E9;
      color: #2E7D32;
    }

    .status.error {
      background: #FFEBEE;
      color: #C62828;
    }

    .status a {
      color: inherit;
      font-weight: 600;
      text-decoration: underline;
    }

    .section {
      margin: 16px 0;
    }

    .divider {
      height: 1px;
      background: var(--figma-color-border);
      margin: 16px 0;
    }

    .instructions {
      font-size: 12px;
      color: var(--figma-color-text-secondary);
      line-height: 1.5;
      margin: 12px 0;
      padding: 12px;
      background: var(--figma-color-bg-secondary);
      border-radius: 6px;
    }

    .logo {
      font-weight: 600;
      color: #18A0FB;
      margin-bottom: 8px;
    }

    .progress {
      width: 100%;
      height: 4px;
      background: var(--figma-color-bg-secondary);
      border-radius: 2px;
      overflow: hidden;
      margin: 8px 0;
      display: none;
    }

    .progress.visible {
      display: block;
    }

    .progress-bar {
      height: 100%;
      background: #18A0FB;
      transition: width 0.3s;
      width: 0%;
    }

    .subscription-card {
      padding: 16px;
      background: var(--figma-color-bg-secondary);
      border-radius: 8px;
      margin-bottom: 12px;
    }

    .subscription-tier {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }

    .badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .badge.free {
      background: #E0E0E0;
      color: #424242;
    }

    .badge.pro {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .badge.enterprise {
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      color: white;
    }

    #tier-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--figma-color-text);
    }

    .usage-info {
      margin-top: 12px;
    }

    .usage-bar-container {
      width: 100%;
      height: 6px;
      background: var(--figma-color-bg);
      border-radius: 3px;
      overflow: hidden;
      margin-bottom: 8px;
    }

    .usage-bar {
      height: 100%;
      background: #18A0FB;
      transition: width 0.3s, background-color 0.3s;
      border-radius: 3px;
    }

    .usage-bar.warning {
      background: #FFA726;
    }

    .usage-bar.danger {
      background: #EF5350;
    }

    .usage-bar.unlimited {
      background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
    }

    .usage-text {
      font-size: 12px;
      color: var(--figma-color-text-secondary);
      text-align: center;
    }

    .upgrade-message {
      padding: 12px;
      background: #FFF3E0;
      border-radius: 6px;
      margin: 12px 0;
      font-size: 12px;
      color: #E65100;
      line-height: 1.5;
    }

    .upgrade-message strong {
      display: block;
      margin-bottom: 4px;
      color: #BF360C;
    }
  </style>

  <script>
    // Firebase Auth is handled externally via auth.html popup window
    // No Firebase SDK needed in the plugin iframe
    console.log("🟡🟡🟡 svg2ooxml plugin loaded - using external OAuth flow");
    console.log("🟡 Inline script in HEAD is running!");

    // Helper to write to visible debug output
    window.debugLog = function(msg) {
      console.log(msg);
      setTimeout(() => {
        const output = document.getElementById('debug-output');
        if (output) {
          output.innerHTML += msg + '<br>';
          output.scrollTop = output.scrollHeight;
        }
      }, 0);
    };
  </script>
</head>
<body>
  <div class="logo">svg2ooxml</div>
  <h2>Export to Google Slides</h2>

  <div id="debug-output" style="background: #f0f0f0; padding: 10px; margin: 10px 0; font-size: 11px; font-family: monospace; max-height: 200px; overflow-y: auto; border: 1px solid #ccc;"></div>

  <!-- Authentication Section -->
  <div id="auth-section" class="section">
    <button id="sign-in-btn" class="primary">
      Sign in with Google
    </button>

    <div id="user-info" class="user-info" style="display: none;">
      <div>✓ Signed in as</div>
      <strong id="user-email"></strong>
      <button id="sign-out-btn" class="secondary" style="margin-top: 8px;">
        Sign out
      </button>
    </div>
  </div>

  <div class="divider"></div>

  <!-- Subscription Section -->
  <div id="subscription-section" class="section" style="display: none;">
    <div class="subscription-card">
      <div class="subscription-tier">
        <span id="tier-badge" class="badge">Free</span>
        <span id="tier-name">Free Plan</span>
      </div>
      <div class="usage-info">
        <div class="usage-bar-container">
          <div id="usage-bar" class="usage-bar"></div>
        </div>
        <div id="usage-text" class="usage-text">0 / 5 exports this month</div>
      </div>
    </div>

    <button id="upgrade-btn" class="primary" style="display: none;">
      ⚡ Upgrade to Pro - $9/month
    </button>

    <button id="manage-subscription-btn" class="secondary" style="display: none;">
      Manage Subscription
    </button>
  </div>

  <div class="divider" id="export-divider" style="display: none;"></div>

  <!-- Export Section -->
  <div id="export-section" class="section" style="display: none;">
    <div class="instructions">
      Select one or more frames in Figma, then click "Export to Slides" to create a Google Slides presentation.
    </div>

    <button id="export-btn" class="primary">
      Export Selected Frames
    </button>

    <div id="progress" class="progress">
      <div id="progress-bar" class="progress-bar"></div>
    </div>
  </div>

  <!-- Status Section -->
  <div id="status" class="status"></div>

  <script>
    debugLog("🟡 DOM ready - script before ui.js");
    const btn = document.getElementById('sign-in-btn');
    debugLog("🟡 sign-in-btn exists? " + (btn ? "YES ✓" : "NO ✗"));
    debugLog("🟡 Loading ui.js...");
  </script>

  <script src="ui.js"></script>

  <script>
    debugLog("🟡 Script AFTER ui.js loaded");
  </script>
</body>
</html>
