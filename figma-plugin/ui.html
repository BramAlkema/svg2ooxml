<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 16px;
      background: var(--figma-color-bg);
      color: var(--figma-color-text);
    }

    h2 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 16px;
      color: var(--figma-color-text);
    }

    button {
      width: 100%;
      padding: 12px 16px;
      margin: 8px 0;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .primary {
      background: #18A0FB;
      color: white;
    }

    .primary:hover:not(:disabled) {
      background: #0D8ADD;
    }

    .secondary {
      background: var(--figma-color-bg-secondary);
      color: var(--figma-color-text);
      border: 1px solid var(--figma-color-border);
    }

    .secondary:hover:not(:disabled) {
      background: var(--figma-color-bg-hover);
    }

    .user-info {
      padding: 12px;
      background: var(--figma-color-bg-secondary);
      border-radius: 6px;
      margin: 12px 0;
      font-size: 13px;
    }

    .user-info strong {
      display: block;
      margin-top: 4px;
      color: var(--figma-color-text);
    }

    .status {
      padding: 12px;
      margin: 12px 0;
      border-radius: 6px;
      font-size: 13px;
      line-height: 1.4;
      display: none;
    }

    .status.visible {
      display: block;
    }

    .status.info {
      background: #E3F2FD;
      color: #1565C0;
    }

    .status.success {
      background: #E8F5E9;
      color: #2E7D32;
    }

    .status.error {
      background: #FFEBEE;
      color: #C62828;
    }

    .status a {
      color: inherit;
      font-weight: 600;
      text-decoration: underline;
    }

    .section {
      margin: 16px 0;
    }

    .divider {
      height: 1px;
      background: var(--figma-color-border);
      margin: 16px 0;
    }

    .instructions {
      font-size: 12px;
      color: var(--figma-color-text-secondary);
      line-height: 1.5;
      margin: 12px 0;
      padding: 12px;
      background: var(--figma-color-bg-secondary);
      border-radius: 6px;
    }

    .logo {
      font-weight: 600;
      color: #18A0FB;
      margin-bottom: 8px;
    }

    .progress {
      width: 100%;
      height: 4px;
      background: var(--figma-color-bg-secondary);
      border-radius: 2px;
      overflow: hidden;
      margin: 8px 0;
      display: none;
    }

    .progress.visible {
      display: block;
    }

    .progress-bar {
      height: 100%;
      background: #18A0FB;
      transition: width 0.3s;
      width: 0%;
    }
  </style>

  <script type="module">
    // Import Firebase modules from CDN
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
    import {
      getAuth,
      signInWithPopup,
      GoogleAuthProvider,
      signOut
    } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';

    // Firebase configuration
    const firebaseConfig = {
      apiKey: "REDACTED_FIREBASE_API_KEY",
      authDomain: "powerful-layout-467812-p1.firebaseapp.com",
      projectId: "powerful-layout-467812-p1",
      storageBucket: "powerful-layout-467812-p1.firebasestorage.app",
      messagingSenderId: "237932518206",
      appId: "1:237932518206:web:101f15382174b93f09aa6f"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // Make globally available
    window.firebaseAuth = auth;
    window.GoogleAuthProvider = GoogleAuthProvider;
    window.signInWithPopup = signInWithPopup;
    window.signOut = signOut;

    console.log("Firebase initialized successfully");
  </script>
</head>
<body>
  <div class="logo">svg2ooxml</div>
  <h2>Export to Google Slides</h2>

  <!-- Authentication Section -->
  <div id="auth-section" class="section">
    <button id="sign-in-btn" class="primary">
      Sign in with Google
    </button>

    <div id="user-info" class="user-info" style="display: none;">
      <div>✓ Signed in as</div>
      <strong id="user-email"></strong>
      <button id="sign-out-btn" class="secondary" style="margin-top: 8px;">
        Sign out
      </button>
    </div>
  </div>

  <div class="divider"></div>

  <!-- Export Section -->
  <div id="export-section" class="section" style="display: none;">
    <div class="instructions">
      Select one or more frames in Figma, then click "Export to Slides" to create a Google Slides presentation.
    </div>

    <button id="export-btn" class="primary">
      Export Selected Frames
    </button>

    <div id="progress" class="progress">
      <div id="progress-bar" class="progress-bar"></div>
    </div>
  </div>

  <!-- Status Section -->
  <div id="status" class="status"></div>

  <script src="ui.js"></script>
</body>
</html>
