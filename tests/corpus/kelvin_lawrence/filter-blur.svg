<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns='http://www.w3.org/2000/svg' version='1.1' width='1000' height='1000'>

<defs>
  <filter color-interpolation-filters="sRGB" id="f1">
    <feGaussianBlur stdDeviation="3" />
  </filter>

</defs>

<rect x="50"  y="85" width="200" height="200" ry="7" fill="#a05a2c" stroke="#bc8f8f" />
<rect x="300" y="85" width="200" height="200" ry="7" fill="#a05a2c" stroke="#bc8f8f" filter="url(#f1)" />
<g fill="black">
  <text x="50" y="300">Before</text>
  <text x="300" y="300">After blur filter</text>
</g>
</svg>