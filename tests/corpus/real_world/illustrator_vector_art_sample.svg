<?xml version="1.0" encoding="UTF-8"?>
<!-- Sample Illustrator-style export: Vector artwork with paths and strokes -->
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <!-- Clip path for star -->
    <clipPath id="star-clip">
      <path d="M 400 150 L 420 200 L 475 210 L 430 250 L 445 305 L 400 275 L 355 305 L 370 250 L 325 210 L 380 200 Z"/>
    </clipPath>
  </defs>
  
  <rect width="800" height="600" fill="#FFFFFF"/>
  
  <!-- Logo design with precise paths -->
  <g transform="translate(100, 100)">
    <!-- Circle with stroke -->
    <circle cx="50" cy="50" r="45" fill="none" stroke="#2C3E50" stroke-width="4"/>
    
    <!-- Abstract shape inside circle -->
    <path d="M 30 40 Q 50 20 70 40 T 90 60 Q 70 80 50 60 T 30 40" 
          fill="#3498DB" stroke="#2C3E50" stroke-width="2"/>
  </g>
  
  <!-- Typography path (converted to curves) -->
  <g transform="translate(250, 150)">
    <path d="M 0 0 L 0 60 M 0 30 L 30 30" stroke="#2C3E50" stroke-width="6" stroke-linecap="round" fill="none"/>
    <path d="M 50 0 L 50 60 L 80 60 Q 95 60 95 45 L 95 15 Q 95 0 80 0 Z" 
          fill="#2C3E50"/>
  </g>
  
  <!-- Geometric pattern -->
  <g transform="translate(100, 300)">
    <rect x="0" y="0" width="50" height="50" fill="#E74C3C"/>
    <rect x="60" y="0" width="50" height="50" fill="#F39C12"/>
    <rect x="120" y="0" width="50" height="50" fill="#F1C40F"/>
    <rect x="180" y="0" width="50" height="50" fill="#2ECC71"/>
    <rect x="240" y="0" width="50" height="50" fill="#3498DB"/>
    <rect x="300" y="0" width="50" height="50" fill="#9B59B6"/>
  </g>
  
  <!-- Star with clip path -->
  <g transform="translate(0, 100)">
    <rect x="325" y="150" width="150" height="155" fill="#F39C12" clip-path="url(#star-clip)"/>
    <path d="M 400 150 L 420 200 L 475 210 L 430 250 L 445 305 L 400 275 L 355 305 L 370 250 L 325 210 L 380 200 Z" 
          fill="none" stroke="#E67E22" stroke-width="3"/>
  </g>
  
  <!-- Complex bezier curves -->
  <g transform="translate(500, 250)">
    <path d="M 0 0 C 20 -40, 60 -40, 80 0 S 140 40, 160 0" 
          stroke="#8E44AD" stroke-width="4" fill="none"/>
    <path d="M 0 50 C 20 10, 60 10, 80 50 S 140 90, 160 50" 
          stroke="#3498DB" stroke-width="4" fill="none"/>
    <path d="M 0 100 C 20 60, 60 60, 80 100 S 140 140, 160 100" 
          stroke="#2ECC71" stroke-width="4" fill="none"/>
  </g>
  
  <!-- Dashed stroke pattern -->
  <line x1="100" y1="500" x2="700" y2="500" 
        stroke="#95A5A6" stroke-width="2" stroke-dasharray="10,5"/>
  
  <!-- Circle pattern with varying strokes -->
  <g transform="translate(100, 450)">
    <circle cx="0" cy="0" r="20" fill="none" stroke="#E74C3C" stroke-width="1"/>
    <circle cx="60" cy="0" r="20" fill="none" stroke="#E67E22" stroke-width="2"/>
    <circle cx="120" cy="0" r="20" fill="none" stroke="#F1C40F" stroke-width="3"/>
    <circle cx="180" cy="0" r="20" fill="none" stroke="#2ECC71" stroke-width="4"/>
    <circle cx="240" cy="0" r="20" fill="none" stroke="#3498DB" stroke-width="5"/>
  </g>
</svg>
