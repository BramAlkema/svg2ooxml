<svg xmlns="http://www.w3.org/2000/svg" width="64" height="48">
  <defs>
    <filter id="lighting">
      <feDiffuseLighting lighting-color="#ffeeaa" surfaceScale="3" diffuseConstant="1.2" result="lighting">
