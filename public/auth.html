<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in - svg2ooxml</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            max-width: 400px;
            width: 100%;
            text-align: center;
        }
        .logo {
            font-weight: bold;
            font-size: 1.2em;
            color: #667eea;
            margin-bottom: 10px;
        }
        h1 {
            color: #333;
            font-size: 1.5em;
            margin-bottom: 20px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 0.9em;
        }
        button {
            width: 100%;
            padding: 14px 20px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }
        .google-btn {
            background: #4285f4;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .google-btn:hover:not(:disabled) {
            background: #357ae8;
        }
        .google-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .google-icon {
            width: 18px;
            height: 18px;
            background: white;
            border-radius: 2px;
            padding: 2px;
        }
        .loading {
            display: none;
            margin: 20px 0;
        }
        .loading.visible {
            display: block;
        }
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .message {
            padding: 15px;
            border-radius: 6px;
            margin: 20px 0;
            display: none;
        }
        .message.visible {
            display: block;
        }
        .message.success {
            background: #e8f5e9;
            color: #2e7d32;
            border: 1px solid #4caf50;
        }
        .message.error {
            background: #ffebee;
            color: #c62828;
            border: 1px solid #f44336;
        }
        .message.success::before {
            content: "✓ ";
            font-weight: bold;
        }
        .message.error::before {
            content: "✗ ";
            font-weight: bold;
        }
        .close-info {
            margin-top: 20px;
            font-size: 0.85em;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">svg2ooxml</div>
        <h1>Sign in to Continue</h1>
        <p class="subtitle">Sign in with your Google account to export to Slides</p>

        <div id="auth-section">
            <button id="sign-in-btn" class="google-btn">
                <svg class="google-icon" viewBox="0 0 24 24">
                    <path fill="#4285f4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                    <path fill="#34a853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#fbbc05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                    <path fill="#ea4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                Sign in with Google
            </button>
        </div>

        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p style="margin-top: 10px; color: #666;">Signing in...</p>
        </div>

        <div id="message" class="message"></div>

        <p class="close-info" id="close-info" style="display: none;">
            You can close this window
        </p>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <script>
        // Parse URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const authKey = urlParams.get('key');

        if (!authKey) {
            showMessage('Invalid authentication link. Missing key parameter.', 'error');
            document.getElementById('sign-in-btn').disabled = true;
        }

        // Firebase configuration
        const firebaseConfig = {
            apiKey: "REDACTED_FIREBASE_API_KEY",
            authDomain: "powerful-layout-467812-p1.firebaseapp.com",
            projectId: "powerful-layout-467812-p1",
            storageBucket: "powerful-layout-467812-p1.firebasestorage.app",
            messagingSenderId: "237932518206",
            appId: "1:237932518206:web:101f15382174b93f09aa6f",
            databaseURL: "https://powerful-layout-467812-p1-default-rtdb.europe-west1.firebasedatabase.app"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();

        // UI elements
        const signInBtn = document.getElementById('sign-in-btn');
        const loading = document.getElementById('loading');
        const messageDiv = document.getElementById('message');
        const authSection = document.getElementById('auth-section');
        const closeInfo = document.getElementById('close-info');

        // Sign in with Google
        signInBtn.addEventListener('click', async () => {
            try {
                signInBtn.disabled = true;
                showLoading(true);
                hideMessage();

                // Create Google Auth provider with required scopes
                const provider = new firebase.auth.GoogleAuthProvider();
                provider.addScope('https://www.googleapis.com/auth/drive.file');
                provider.addScope('https://www.googleapis.com/auth/presentations');

                // Request offline access to get refresh token
                provider.setCustomParameters({
                    access_type: 'offline',
                    prompt: 'consent'
                });

                // Sign in with popup
                const result = await auth.signInWithPopup(provider);

                // Get Firebase ID token
                const token = await result.user.getIdToken();

                // Get Google OAuth refresh token from credential
                // This is the actual OAuth refresh token, not Firebase's refresh token
                const googleRefreshToken = result.credential?.refreshToken || result.user.refreshToken;

                console.log('OAuth credential:', result.credential);
                console.log('Has Google refresh token:', !!googleRefreshToken);

                // Store both tokens in database
                await database.ref(`auth-tokens/${authKey}`).set({
                    token: token,
                    refreshToken: googleRefreshToken,
                    email: result.user.email,
                    timestamp: Date.now(),
                    expires: Date.now() + 300000 // 5 minutes
                });

                // Show success
                showLoading(false);
                authSection.style.display = 'none';
                showMessage(`Signed in successfully as ${result.user.email}`, 'success');
                closeInfo.style.display = 'block';

                // Auto-close window after 2 seconds
                setTimeout(() => {
                    window.close();
                }, 2000);

            } catch (error) {
                console.error('Sign-in error:', error);
                showLoading(false);
                signInBtn.disabled = false;

                let errorMessage = 'Sign-in failed. Please try again.';

                if (error.code === 'auth/popup-closed-by-user') {
                    errorMessage = 'Sign-in cancelled. Please try again.';
                } else if (error.code === 'auth/network-request-failed') {
                    errorMessage = 'Network error. Please check your connection and try again.';
                } else if (error.message) {
                    errorMessage = error.message;
                }

                showMessage(errorMessage, 'error');
            }
        });

        function showLoading(show) {
            loading.className = show ? 'loading visible' : 'loading';
        }

        function showMessage(text, type) {
            messageDiv.textContent = text;
            messageDiv.className = `message ${type} visible`;
        }

        function hideMessage() {
            messageDiv.className = 'message';
        }
    </script>
</body>
</html>
