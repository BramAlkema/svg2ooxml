<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect Google Drive - svg2ooxml</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            line-height: 1.6;
            color: #ffffff;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a2e 50%, #0a0a1a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: rgba(26, 26, 46, 0.9);
            backdrop-filter: blur(10px);
            padding: 50px;
            border-radius: 16px;
            border: 1px solid rgba(0, 212, 255, 0.2);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
            max-width: 420px;
            width: 100%;
            text-align: center;
        }
        .logo {
            font-weight: 700;
            font-size: 1.3em;
            color: #00d4ff;
            margin-bottom: 15px;
            letter-spacing: 1px;
        }
        h1 {
            color: #ffffff;
            font-size: 1.6em;
            margin-bottom: 15px;
            font-weight: 600;
        }
        .subtitle {
            color: #94a3b8;
            margin-bottom: 35px;
            font-size: 1em;
        }
        button {
            width: 100%;
            padding: 16px 24px;
            background: linear-gradient(135deg, #00d4ff 0%, #8b5cf6 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(0, 212, 255, 0.3);
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(0, 212, 255, 0.5);
        }
        button:disabled {
            background: #3f3f5a;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }
        .message {
            margin-top: 25px;
            padding: 16px;
            border-radius: 8px;
            font-size: 14px;
        }
        .message.success {
            background: rgba(34, 197, 94, 0.15);
            color: #4ade80;
            border: 1px solid rgba(34, 197, 94, 0.3);
        }
        .message.error {
            background: rgba(239, 68, 68, 0.15);
            color: #f87171;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }
        .close-info {
            margin-top: 25px;
            font-size: 0.9em;
            color: #4ade80;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">svg2ooxml</div>
        <h1>Connect Google Drive</h1>
        <p class="subtitle">Grant access to publish presentations to your Google Drive</p>

        <button id="connect-btn">Connect Google Drive</button>

        <div id="message"></div>
        <div id="close-info" class="close-info" style="display: none;">
            \u2713 Connected! You can close this window.
        </div>
    </div>

    <script>
        // OAuth configuration
        const CLIENT_ID = '237932518206-vulgj43i9g6mcmsqvndnrj4ehqqjhv7i.apps.googleusercontent.com';
        const REDIRECT_URI = 'https://powerful-layout-467812-p1.web.app/oauth-callback.html';
        const SCOPES = [
            'https://www.googleapis.com/auth/drive.file',
            'https://www.googleapis.com/auth/presentations'
        ].join(' ');

        const urlParams = new URLSearchParams(window.location.search);
        const authKey = urlParams.get('key');

        const connectBtn = document.getElementById('connect-btn');
        const messageDiv = document.getElementById('message');
        const closeInfo = document.getElementById('close-info');

        function showMessage(text, type) {
            messageDiv.textContent = text;
            messageDiv.className = `message ${type}`;
        }

        if (!authKey) {
            showMessage('Invalid link. Missing key parameter.', 'error');
            connectBtn.disabled = true;
        }

        connectBtn.addEventListener('click', () => {
            // Build OAuth URL
            const authUrl = new URL('https://accounts.google.com/o/oauth2/v2/auth');
            authUrl.searchParams.set('client_id', CLIENT_ID);
            authUrl.searchParams.set('redirect_uri', REDIRECT_URI);
            authUrl.searchParams.set('response_type', 'code');
            authUrl.searchParams.set('scope', SCOPES);
            authUrl.searchParams.set('access_type', 'offline');
            authUrl.searchParams.set('prompt', 'consent');
            authUrl.searchParams.set('state', authKey);

            // Redirect to Google OAuth
            window.location.href = authUrl.toString();
        });
    </script>
</body>
</html>
