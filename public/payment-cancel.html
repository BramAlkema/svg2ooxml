<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Cancelled - svg2ooxml</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
      background: linear-gradient(135deg, #0a0a1a 0%, #1a1a2e 50%, #0a0a1a 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      background: rgba(26, 26, 46, 0.9);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      padding: 50px;
      max-width: 500px;
      width: 100%;
      text-align: center;
      border: 1px solid rgba(0, 212, 255, 0.2);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
    }

    .cancel-icon {
      width: 90px;
      height: 90px;
      background: linear-gradient(135deg, #ff6b35 0%, #f59e0b 100%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 28px;
      animation: scale-in 0.5s ease-out;
      box-shadow: 0 8px 30px rgba(255, 107, 53, 0.4);
    }

    .cancel-icon svg {
      width: 50px;
      height: 50px;
      stroke: white;
      stroke-width: 3;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    @keyframes scale-in {
      from {
        transform: scale(0);
        opacity: 0;
      }
      to {
        transform: scale(1);
        opacity: 1;
      }
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
      color: #ffffff;
      margin-bottom: 14px;
    }

    p {
      font-size: 16px;
      color: #94a3b8;
      line-height: 1.7;
      margin-bottom: 24px;
    }

    .info-box {
      background: rgba(255, 107, 53, 0.1);
      border: 1px solid rgba(255, 107, 53, 0.2);
      border-radius: 12px;
      padding: 22px;
      margin: 28px 0;
      text-align: left;
    }

    .info-box p {
      margin-bottom: 0;
      color: #fbbf24;
      font-size: 15px;
    }

    .buttons {
      display: flex;
      gap: 14px;
      flex-direction: column;
      margin-top: 28px;
    }

    .button {
      display: inline-block;
      padding: 16px 36px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      font-size: 16px;
      transition: all 0.3s ease;
    }

    .button.primary {
      background: linear-gradient(135deg, #00d4ff 0%, #8b5cf6 100%);
      color: white;
      box-shadow: 0 4px 20px rgba(0, 212, 255, 0.3);
    }

    .button.primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(0, 212, 255, 0.5);
    }

    .button.secondary {
      background: rgba(255, 255, 255, 0.05);
      color: #94a3b8;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .button.secondary:hover {
      background: rgba(255, 255, 255, 0.1);
      color: #ffffff;
    }

    .footer {
      margin-top: 35px;
      padding-top: 25px;
      border-top: 1px solid rgba(0, 212, 255, 0.15);
      font-size: 14px;
      color: #64748b;
    }

    .footer a {
      color: #00d4ff;
      text-decoration: none;
      transition: color 0.2s;
    }

    .footer a:hover {
      color: #8b5cf6;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="cancel-icon">
      <svg viewBox="0 0 24 24">
        <line x1="18" y1="6" x2="6" y2="18"></line>
        <line x1="6" y1="6" x2="18" y2="18"></line>
      </svg>
    </div>

    <h1>Payment Cancelled</h1>
    <p>Your payment was cancelled. No charges have been made to your account.</p>

    <div class="info-box">
      <p>
        <strong>Need more time to decide?</strong><br>
        You can continue using the free plan (5 exports/month) or upgrade anytime from the plugin.
      </p>
    </div>

    <div class="buttons">
      <a href="javascript:history.back()" class="button primary">Try Again</a>
      <a href="/" class="button secondary">Return to svg2ooxml</a>
    </div>

    <div class="footer">
      Questions? <a href="mailto:support@svg2ooxml.com">Contact Support</a>
    </div>
  </div>

  <script>
    // Auto-close window after 10 seconds
    setTimeout(() => {
      window.close();
    }, 10000);
  </script>
</body>
</html>
