name: Bug Report
description: Report a bug in svg2ooxml
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for reporting a bug! Please fill out the sections below.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      description: Minimal steps or code to reproduce the issue.
      placeholder: |
        ```python
        from svg2ooxml import SvgToPptxExporter
        exporter = SvgToPptxExporter()
        exporter.export("input.svg", "output.pptx")
        ```
    validations:
      required: true
  - type: textarea
    id: svg-input
    attributes:
      label: SVG Input
      description: The SVG content that triggers the issue (if applicable).
      render: xml
  - type: input
    id: version
    attributes:
      label: svg2ooxml version
      placeholder: "0.2.0"
    validations:
      required: true
  - type: input
    id: python-version
    attributes:
      label: Python version
      placeholder: "3.13"
  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS
        - Linux
        - Windows
