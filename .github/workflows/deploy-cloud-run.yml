name: Deploy Cloud Run

# GCP project deleted 2026-01-16 — disabled until new infra is set up
on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Build and Deploy to Cloud Run
        run: |
          gcloud builds submit \
            --config cloudbuild.yaml \
            --project powerful-layout-467812-p1 \
            --region europe-west1

      - name: Get Service URL
        id: service-url
        run: |
          URL=$(gcloud run services describe svg2ooxml-export \
            --region=europe-west1 \
            --project=powerful-layout-467812-p1 \
            --format='value(status.url)')
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "SERVICE_URL=$URL" >> $GITHUB_ENV

      - name: Deployment Summary
        run: |
          echo "### Cloud Run Deployment Complete! 🚀" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Service URL:** ${{ steps.service-url.outputs.url }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Deployed Components:**" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ FastAPI Backend" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Stripe Integration" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Subscription Management" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Webhook Handlers" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Export Pipeline" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**API Endpoints:**" >> $GITHUB_STEP_SUMMARY
          echo "- Health: ${{ steps.service-url.outputs.url }}/health" >> $GITHUB_STEP_SUMMARY
          echo "- Export: ${{ steps.service-url.outputs.url }}/api/v1/export" >> $GITHUB_STEP_SUMMARY
          echo "- Subscription: ${{ steps.service-url.outputs.url }}/api/v1/subscription/status" >> $GITHUB_STEP_SUMMARY
          echo "- Webhooks: ${{ steps.service-url.outputs.url }}/api/webhook/stripe" >> $GITHUB_STEP_SUMMARY

      - name: Health Check
        run: |
          echo "🏥 Running health check..."
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" ${{ steps.service-url.outputs.url }}/health)
          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ Health check passed!"
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Health Check:** ✅ Passed (HTTP $HTTP_CODE)" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Health check failed! HTTP $HTTP_CODE"
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Health Check:** ❌ Failed (HTTP $HTTP_CODE)" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
