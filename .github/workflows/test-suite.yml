name: Tests

on:
  workflow_dispatch:

jobs:
  unit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libgles2

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev,color,api,cloud,slides,render]
          pip install "openxml-audit[pptx-lab]>=0.5.0"

      - name: Run test suite
        run: |
          python -m pytest -m "not visual" --maxfail=1 --disable-warnings \
            --ignore=tests/integration/core/test_pipeline.py \
            --ignore=tests/integration/test_filter_emf_regression.py \
            --ignore=tests/integration/test_filter_vector_promotion.py \
            --ignore=tests/integration/test_webfont_embedding_e2e.py \
            --ignore=tests/unit/api/test_background_queue.py

  w3c-sample:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libgles2

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[render,color]
          pip install "openxml-audit>=0.5.0"

      - name: Run W3C sample with OpenXML gating
        env:
          OPENXML_VALIDATOR: openxml-audit
        run: |
          python tests/corpus/run_corpus.py \
            --corpus-dir tests/svg \
            --metadata tests/corpus/w3c_corpus_metadata.json \
            --output-dir reports/w3c_sample_output \
            --report reports/w3c_sample_report.json \
            --mode resvg \
            --sample-size 50 \
            --sample-seed 1234 \
            --openxml-audit \
            --openxml-required \
            --openxml-min-pass-rate 0.98

      - name: Upload W3C sample report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: w3c-sample-report
          path: reports/w3c_sample_report.json
