name: W3C Animation Gate

on:
  workflow_dispatch:
    inputs:
      full_animation:
        description: "Run full animation profile (40/40) instead of PR sample (20/40)"
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "17 4 * * *"
  pull_request:
    paths:
      - "src/svg2ooxml/core/animation/**"
      - "src/svg2ooxml/drawingml/animation/**"
      - "src/svg2ooxml/drawingml/animation_pipeline.py"
      - "src/svg2ooxml/ir/animation.py"
      - "tests/corpus/**"
      - ".github/workflows/w3c-animation-gate.yml"

jobs:
  required-profiles:
    if: github.event_name == 'pull_request' || github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && !inputs.full_animation)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libgles2

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[render,color]
          pip install openxml-audit

      - name: Run Profile A (gradients + shapes) with OpenXML gating
        env:
          OPENXML_VALIDATOR: openxml-audit
        run: |
          ./tests/corpus/run_w3c_corpus.sh gradients --mode resvg --openxml-audit --openxml-required --openxml-min-pass-rate 0.98
          ./tests/corpus/run_w3c_corpus.sh shapes --mode resvg --openxml-audit --openxml-required --openxml-min-pass-rate 0.98

      - name: Run Profile B (animation sample) with OpenXML gating
        env:
          OPENXML_VALIDATOR: openxml-audit
        run: |
          python tests/corpus/add_w3c_corpus.py \
            --category animate \
            --limit 40 \
            --output tests/corpus/w3c/w3c_animation_metadata.json

          python tests/corpus/run_corpus.py \
            --corpus-dir tests/svg \
            --metadata tests/corpus/w3c/w3c_animation_metadata.json \
            --output-dir tests/corpus/w3c/output_animation \
            --report tests/corpus/w3c/report_animation.json \
            --mode resvg \
            --sample-size 20 \
            --sample-seed 20260221 \
            --openxml-audit \
            --openxml-required \
            --openxml-min-pass-rate 0.98

      - name: Upload W3C animation gate reports
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: w3c-animation-gate-reports
          path: |
            tests/corpus/w3c/report_gradients.json
            tests/corpus/w3c/report_shapes.json
            tests/corpus/w3c/report_animation.json
            tests/corpus/w3c/w3c_gradients_metadata.json
            tests/corpus/w3c/w3c_shapes_metadata.json
            tests/corpus/w3c/w3c_animation_metadata.json

  full-animation:
    if: github.event_name == 'workflow_dispatch' && inputs.full_animation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libgles2

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[render,color]
          pip install openxml-audit

      - name: Run full Profile B (animation 40/40) with OpenXML gating
        env:
          OPENXML_VALIDATOR: openxml-audit
        run: |
          python tests/corpus/add_w3c_corpus.py \
            --category animate \
            --limit 40 \
            --output tests/corpus/w3c/w3c_animation_metadata.json

          python tests/corpus/run_corpus.py \
            --corpus-dir tests/svg \
            --metadata tests/corpus/w3c/w3c_animation_metadata.json \
            --output-dir tests/corpus/w3c/output_animation_full \
            --report tests/corpus/w3c/report_animation_full.json \
            --mode resvg \
            --sample-size 40 \
            --sample-seed 20260221 \
            --openxml-audit \
            --openxml-required \
            --openxml-min-pass-rate 0.98

      - name: Upload full animation gate report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: w3c-animation-gate-full-report
          path: |
            tests/corpus/w3c/report_animation_full.json
            tests/corpus/w3c/w3c_animation_metadata.json
