substitutions:
  _REGION: europe-west1
  _SERVICE: svg2ooxml-export
  _REPOSITORY: svg2ooxml
  _IMAGE: svg2ooxml-service
  _STRIPE_SECRET_KEY: REDACTED_STRIPE_KEY
  _STRIPE_PRICE_ID_PRO: price_1SP750FYNR8EjxcIGX5RQ2uQ
  _STRIPE_PRICE_ID_ENTERPRISE: price_1SP75JFYNR8EjxcI0bnw5tIb

options:
  logging: CLOUD_LOGGING_ONLY

steps:
  # Build custom run image with OpenGL libraries for skia-python
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - infrastructure/run.Dockerfile
      - -t
      - $_REGION-docker.pkg.dev/$PROJECT_ID/$_REPOSITORY/run:latest
      - .

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - $_REGION-docker.pkg.dev/$PROJECT_ID/$_REPOSITORY/run:latest

  # Build application using buildpacks with custom run image
  - name: gcr.io/k8s-skaffold/pack
    args:
      - build
      - $_REGION-docker.pkg.dev/$PROJECT_ID/$_REPOSITORY/$_IMAGE:latest
      - --path=.
      - --builder=gcr.io/buildpacks/builder:v1
      - --run-image=$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPOSITORY/run:latest
      - --publish

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    args:
      - gcloud
      - run
      - deploy
      - $_SERVICE
      - --image=$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPOSITORY/$_IMAGE:latest
      - --region=$_REGION
      - --platform=managed
      - --service-account=svg2ooxml-runner@$PROJECT_ID.iam.gserviceaccount.com
      - --allow-unauthenticated
      - --set-env-vars=PYTHONPATH=/workspace/src,GCP_PROJECT=$PROJECT_ID,CLOUD_TASKS_LOCATION=$_REGION,CLOUD_TASKS_QUEUE=svg2ooxml-jobs,FIREBASE_PROJECT_ID=$PROJECT_ID,FIREBASE_SERVICE_ACCOUNT_PATH=/secrets/firebase-service-account,ENVIRONMENT=production,STRIPE_SECRET_KEY=${_STRIPE_SECRET_KEY},STRIPE_PRICE_ID_PRO=${_STRIPE_PRICE_ID_PRO},STRIPE_PRICE_ID_ENTERPRISE=${_STRIPE_PRICE_ID_ENTERPRISE},DISABLE_EXPORT_QUOTA=false
      - --update-secrets=/secrets/firebase-service-account=firebase-service-account:latest,TOKEN_ENCRYPTION_KEY=token-encryption-key:latest,FIREBASE_WEB_CLIENT_ID=firebase-web-client-id:latest,FIREBASE_WEB_CLIENT_SECRET=firebase-web-client-secret:latest

  # Update SERVICE_URL after deployment (get actual URL from Cloud Run)
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    args:
      - -c
      - |
        SERVICE_URL=$$(gcloud run services describe $_SERVICE --region=$_REGION --format="value(status.url)")
        gcloud run services update $_SERVICE \
          --region=$_REGION \
          --update-env-vars=SERVICE_URL=$$SERVICE_URL
