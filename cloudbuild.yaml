substitutions:
  _REGION: europe-west1
  _SERVICE: svg2ooxml-export
  _REPOSITORY: svg2ooxml
  _IMAGE: svg2ooxml-service

options:
  logging: CLOUD_LOGGING_ONLY

steps:
  - name: gcr.io/k8s-skaffold/pack
    args:
      - build
      - $_REGION-docker.pkg.dev/$PROJECT_ID/$_REPOSITORY/$_IMAGE:$COMMIT_SHA
      - --path=.
      - --builder=gcr.io/buildpacks/builder:v1
      - --tag=$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPOSITORY/$_IMAGE:latest
      - --publish

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    args:
      - gcloud
      - run
      - deploy
      - $_SERVICE
      - --image=$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPOSITORY/$_IMAGE:$COMMIT_SHA
      - --region=$_REGION
      - --platform=managed
      - --service-account=svg2ooxml-runner@$PROJECT_ID.iam.gserviceaccount.com
      - --allow-unauthenticated
      - --set-env-vars=PYTHONPATH=/workspace/src,GCP_PROJECT=$PROJECT_ID,CLOUD_TASKS_LOCATION=$_REGION,CLOUD_TASKS_QUEUE=svg2ooxml-jobs

  # Update SERVICE_URL after deployment (get actual URL from Cloud Run)
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    args:
      - -c
      - |
        SERVICE_URL=$(gcloud run services describe $_SERVICE --region=$_REGION --format="value(status.url)")
        gcloud run services update $_SERVICE \
          --region=$_REGION \
          --update-env-vars=SERVICE_URL=$SERVICE_URL
