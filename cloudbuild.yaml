substitutions:
  _REGION: europe-west1
  _SERVICE: svg2ooxml-export
  _REPOSITORY: svg2ooxml
  _IMAGE: svg2ooxml-service

options:
  logging: CLOUD_LOGGING_ONLY

steps:
  - name: gcr.io/k8s-skaffold/pack
    args:
      - build
      - $_REGION-docker.pkg.dev/$PROJECT_ID/$_REPOSITORY/$_IMAGE:$COMMIT_SHA
      - --path=.
      - --builder=gcr.io/buildpacks/builder:v1
      - --tag=$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPOSITORY/$_IMAGE:latest
      - --publish

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    args:
      - gcloud
      - run
      - deploy
      - $_SERVICE
      - --image=$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPOSITORY/$_IMAGE:$COMMIT_SHA
      - --region=$_REGION
      - --platform=managed
      - --service-account=svg2ooxml-runner@$PROJECT_ID.iam.gserviceaccount.com
      - --allow-unauthenticated
      - --set-env-vars=PYTHONPATH=/workspace/src
