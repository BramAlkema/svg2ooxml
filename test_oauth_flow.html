<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test OAuth Flow</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
        }
        button {
            padding: 12px 24px;
            font-size: 16px;
            cursor: pointer;
            background: #4285f4;
            color: white;
            border: none;
            border-radius: 6px;
        }
        button:hover {
            background: #357ae8;
        }
        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 6px;
            display: none;
        }
        .status.visible {
            display: block;
        }
        .status.success {
            background: #e8f5e9;
            color: #2e7d32;
        }
        .status.error {
            background: #ffebee;
            color: #c62828;
        }
        .status.info {
            background: #e3f2fd;
            color: #1565c0;
        }
        pre {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 6px;
            overflow-x: auto;
        }
    </style>
</head>
<body>
    <h1>OAuth Flow Test</h1>
    <p>This page tests the browser-compatible OAuth flow for the Figma plugin.</p>

    <button id="test-btn">Test OAuth Flow</button>

    <div id="status" class="status"></div>
    <pre id="result" style="display: none;"></pre>

    <script>
        const AUTH_URL = 'https://powerful-layout-467812-p1.web.app';
        const AUTH_POLL_INTERVAL = 2000;
        const AUTH_TIMEOUT = 120000;

        const testBtn = document.getElementById('test-btn');
        const statusDiv = document.getElementById('status');
        const resultPre = document.getElementById('result');

        // Generate secure random auth key
        function generateAuthKey() {
            const array = new Uint8Array(16);
            crypto.getRandomValues(array);
            return Array.from(array, byte =>
                byte.toString(16).padStart(2, '0')
            ).join('');
        }

        // Show status
        function showStatus(message, type) {
            statusDiv.textContent = message;
            statusDiv.className = `status ${type} visible`;
        }

        // Sleep helper
        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        // Poll for auth token
        async function pollForAuthToken(authKey, authWindow) {
            const startTime = Date.now();
            let attempts = 0;
            const maxAttempts = AUTH_TIMEOUT / AUTH_POLL_INTERVAL;

            while (Date.now() - startTime < AUTH_TIMEOUT) {
                attempts++;

                if (authWindow.closed) {
                    throw new Error('Sign-in window was closed before completing authentication');
                }

                try {
                    const response = await fetch(`${AUTH_URL}/auth-status.html?key=${authKey}`);
                    const data = await response.json();

                    if (data.status === 'ready') {
                        if (!authWindow.closed) {
                            authWindow.close();
                        }
                        return { token: data.token, email: data.email };
                    }

                    if (data.status === 'expired' || data.status === 'not_found') {
                        if (!authWindow.closed) {
                            authWindow.close();
                        }
                        throw new Error('Authentication failed or expired');
                    }

                } catch (error) {
                    if (error.message.includes('failed') || error.message.includes('expired')) {
                        throw error;
                    }
                }

                showStatus(`Waiting for authentication... (${attempts}/${maxAttempts})`, 'info');
                await sleep(AUTH_POLL_INTERVAL);
            }

            if (!authWindow.closed) {
                authWindow.close();
            }
            throw new Error('Authentication timeout');
        }

        // Test OAuth flow
        testBtn.addEventListener('click', async () => {
            try {
                testBtn.disabled = true;
                resultPre.style.display = 'none';

                const authKey = generateAuthKey();
                showStatus('Opening sign-in window...', 'info');

                // Open auth window
                const authWindow = window.open(
                    `${AUTH_URL}/auth.html?key=${authKey}`,
                    '_blank',
                    'width=500,height=600,menubar=no,toolbar=no,location=no'
                );

                if (!authWindow) {
                    throw new Error('Popup blocked. Please allow popups and try again.');
                }

                // Poll for token
                const result = await pollForAuthToken(authKey, authWindow);

                showStatus(`✅ Authentication successful!`, 'success');
                resultPre.textContent = JSON.stringify({
                    email: result.email,
                    token: result.token.substring(0, 50) + '...' // Truncate for display
                }, null, 2);
                resultPre.style.display = 'block';

            } catch (error) {
                console.error('OAuth flow error:', error);
                showStatus(`❌ Error: ${error.message}`, 'error');
            } finally {
                testBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
