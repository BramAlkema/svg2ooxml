<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="arrow" x1="200" y1="256" x2="312" y2="256" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#e0e7ff"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- SVG bracket left -->
  <text x="60" y="290" font-family="SF Mono, Menlo, Consolas, monospace" font-size="160" font-weight="700" fill="#e0e7ff" opacity="0.9">&lt;/&gt;</text>

  <!-- Arrow -->
  <path d="M295 232 L340 256 L295 280" stroke="url(#arrow)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- PPTX slide icon -->
  <rect x="370" y="186" width="100" height="140" rx="10" fill="#ffffff" opacity="0.95"/>
  <rect x="382" y="198" width="76" height="50" rx="4" fill="#6366f1" opacity="0.25"/>
  <rect x="382" y="258" width="50" height="6" rx="3" fill="#6366f1" opacity="0.4"/>
  <rect x="382" y="272" width="65" height="6" rx="3" fill="#6366f1" opacity="0.25"/>
  <rect x="382" y="286" width="40" height="6" rx="3" fill="#6366f1" opacity="0.15"/>
</svg>
